function fmtD(s){
  if(!s) return '--';
  var p=s.split('-');

}
function fmtDT(s){

  try{ var d=new Date(s); return d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }

}

// helpers DOM
function tr(celulas){
  var row=document.createElement('tr');
  celulas.forEach(function(c){
    var td=document.createElement('td');
    if(c&&c.nodeType) td.appendChild(c);
    else if(typeof c==='string') td.innerHTML=c;
    else td.textContent=(c===null||c===undefined)?'--':c;
    row.appendChild(td);
  });
  return row;
}
function vazioRow(cols,msg){

function fazerLogin(){
  var email=gv('le'), senha=gi('ls').value;
  if(!email||!senha){ showErroLogin('Preencha e-mail e senha.'); return; }
  var btn=gi('btn-login-entrar');
  if(btn){ btn.disabled=true; btn.textContent='Entrando...'; }
  sb.auth.signInWithPassword({email:email,password:senha}).then(function(res){
    if(btn){ btn.disabled=false; btn.textContent='Entrar'; }
    if(res.error){ showErroLogin('E-mail ou senha incorretos.'); return; }
    iniciarSessao(res.data.user);
  });
}
gi('ls').addEventListener('keydown',function(e){ if(e.key==='Enter') fazerLogin(); });

function showErroLogin(msg){ var e=gi('login-erro'); e.textContent=msg; e.style.display='block'; }

function iniciarSessao(user){
  sb.from('profiles').select('*').eq('id',user.id).single().then(function(res){
    if(!res.data){ showErroLogin('Perfil nao encontrado. Verifique o e-mail.'); return; }
    ME=res.data;
    gi('hn').textContent=ME.nome;
    gi('hb').textContent=ME.papel==='SYSADMIN'?'SYSADMIN':'MEMBRO';
    gi('hb').className='badge-papel '+(ME.papel==='SYSADMIN'?'bp-sysadmin':'bp-membro');
    gi('btn-nav-sys').style.display=ME.papel==='SYSADMIN'?'':'none';
    gi('btn-nav-sys').style.display=ME.papel==='SYSADMIN'?'':'none';
    if(gi('btn-gestao')) gi('btn-gestao').style.display=ME.papel==='SYSADMIN'?'':'none';
    gi('tela-login').style.display='none';
    gi('tela-app').style.display='block';
    toast('Ola, '+ME.nome+'!','ok');
    // processa convites pendentes
    processarConvitePendente(ME.id, ME.email);
  });
}

sb.auth.getSession().then(function(res){
  if(res.data&&res.data.session){
    iniciarSessao(res.data.session.user);
  } else {
    // verifica se tem token de convite na URL
    var params = new URLSearchParams(window.location.search);
    var token = params.get('convite');
    var emailConvite = params.get('email');
    if(token && emailConvite){
      // pre-preenche o email e abre cadastro
      gi('le').value = decodeURIComponent(emailConvite);
      gi('tela-login').style.display = 'flex';
      // guarda o token para processar apos cadastro
      window._conviteToken = token;
      window._conviteEmail = decodeURIComponent(emailConvite);
      // abre modal de cadastro automaticamente
      setTimeout(function(){
        gi('ce').value = decodeURIComponent(emailConvite);
        abrirModal('m-cadastro');
        toast('Complete seu cadastro para entrar na viagem!','ok');
      }, 500);
    }
  }
});

  sb.from('convites_pendentes').select('*').eq('email',email).eq('aceito',false).then(function(res){
    var convites = res.data||[];
    if(!convites.length) return;
    var inserts = convites.map(function(cv){
      return {viagem_id:cv.viagem_id, user_id:userId, role:cv.role||'MEMBRO'};
    });
    sb.from('viagem_participantes').upsert(inserts).then(function(){
      sb.from('convites_pendentes').update({aceito:true}).eq('email',email).then(function(){
        toast('Voce foi adicionado a '+ convites.length +' viagem(ns)!','ok');
      });
    });
  });
}

    if(res.data&&res.data.user){

function _classificar(v){
  if(!v.ida && !v.volta) return 'proxima';
  var hoje = new Date(); hoje.setHours(0,0,0,0);
  var ida   = v.ida   ? new Date(v.ida+'T12:00')   : null;
  var volta = v.volta ? new Date(v.volta+'T12:00')  : null;
  if(ida && volta){
    if(hoje >= ida && hoje <= volta) return 'andamento';
    if(hoje > volta)                 return 'passada';
    return 'proxima';
  }
  if(ida && !volta) return hoje >= ida ? 'andamento' : 'proxima';
  if(!ida && volta) return hoje > volta ? 'passada' : 'proxima';
  return 'proxima';
}

function _criarCard(v, parts){
  var total=v.viagem_participantes&&v.viagem_participantes[0]?v.viagem_participantes[0].count:0;
  var meuRole='MEMBRO';
  if(ME.papel==='SYSADMIN') meuRole='SYSADMIN';
  else if(parts){ var p=parts.find(function(p){return p.viagem_id===v.id;}); if(p) meuRole=p.role; }
  var lbls={SYSADMIN:'SysAdmin',TRIP_ADMIN:'Admin da viagem',MEMBRO:'Membro'};
  var lbl=lbls[meuRole]||meuRole;
  var status=_classificar(v);
  var statusLabel={'andamento':'Em andamento','proxima':'Proxima','passada':'Passada'}[status];
  var statusCss={'andamento':'status-andamento','proxima':'status-proxima','passada':'status-passada'}[status];
  var hue=v.id.charCodeAt(0)*47%360, hue2=(hue+60)%360;
  var card=document.createElement('div');
  card.className='viagem-card'+(status==='passada'?' vc-passada':'');
  if(status==='passada') card.style.opacity='.75';
  card.onclick=(function(vo){return function(){abrirViagem(vo);};})(v);
  var capa=document.createElement('div'); capa.className='vc-capa';
  capa.style.background='linear-gradient(135deg,hsl('+hue+',60%,35%),hsl('+hue2+',55%,55%))';
  if(v.capa_url){var img=document.createElement('img');img.src=v.capa_url;capa.appendChild(img);}
  var ov=document.createElement('div'); ov.className='vc-overlay';
  var pe=document.createElement('div'); pe.className='vc-pessoas'; pe.innerHTML='&#128101; '+total;
  var bs=document.createElement('div'); bs.className='vc-badge-status '+statusCss; bs.textContent=statusLabel;
  capa.appendChild(ov); capa.appendChild(pe); capa.appendChild(bs); card.appendChild(capa);
  var body=document.createElement('div'); body.className='vc-body';
  var nm=document.createElement('div'); nm.className='vc-nome'; nm.textContent=v.nome;
  var dt=document.createElement('div'); dt.className='vc-dest'; dt.innerHTML='&#128205; '+v.destino;
  var ds=document.createElement('div'); ds.className='vc-datas'; ds.textContent=fmtD(v.ida)+' \u2192 '+fmtD(v.volta);
  var rl=document.createElement('span'); rl.className='vc-role'; rl.textContent=lbl;
  body.appendChild(nm); body.appendChild(dt); body.appendChild(ds); body.appendChild(rl);
  card.appendChild(body);
  return card;
}

function _renderSecao(g, titulo, icone, viagens, parts, badgeCss){
  if(!viagens.length) return;
  var sec=document.createElement('div'); sec.className='secao-viagens';
  var tit=document.createElement('div'); tit.className='secao-viagens-titulo';
  var h2=document.createElement('h2'); h2.textContent=icone+' '+titulo;
  var cnt=document.createElement('span'); cnt.className='badge-count '+(badgeCss||'');
  cnt.textContent=viagens.length;
  tit.appendChild(h2); tit.appendChild(cnt); sec.appendChild(tit);
  var grid=document.createElement('div'); grid.className='grid-viagens';
  viagens.forEach(function(v){ grid.appendChild(_criarCard(v,parts)); });
  sec.appendChild(grid); g.appendChild(sec);
}

function _renderGrid(viagens, parts){
  var g=gi('grid-viagens'); g.innerHTML='';
  if(!viagens.length){
    var isDesktop = window.innerWidth >= 900;
    var div=document.createElement('div');
    if(isDesktop){
      div.className='vazio-desktop';
      div.innerHTML=
        '<div class="vd-icone">&#128506;&#65039;</div>'+
        '<div class="vd-titulo">Nenhuma viagem ainda</div>'+
        '<div class="vd-sub">Crie sua primeira viagem e comece a organizar voos, hospedagem, passeios e muito mais.</div>'+
        '<button class="btn-add laranja" style="font-size:1rem;padding:14px 32px" onclick="abrirModalNovaViagem()">+ Criar primeira viagem</button>';
    } else {
      div.className='vazio';
      div.innerHTML='<div class="vazio-icone">&#128506;</div>Nenhuma viagem ainda. Crie a primeira!';
    }
    g.appendChild(div); return;
  }
  var andamento=[], proximas=[], passadas=[];
  viagens.forEach(function(v){
    var s=_classificar(v);
    if(s==='andamento') andamento.push(v);
    else if(s==='proxima') proximas.push(v);
    else passadas.push(v);
  });
  _renderSecao(g,'Em andamento','&#9992;',andamento,parts,'badge-andamento');
  _renderSecao(g,'Proximas viagens','&#128197;',proximas,parts,'');
  var secPassadas = _renderSecao(g,'Viagens passadas','&#128444;',passadas,parts,'badge-passadas');
  // ocultar por padrao
  if(!_mostrarPassadas){
    var secs=g.querySelectorAll('.secao-viagens');
    secs.forEach(function(s){
      var titulo=s.querySelector('h2');
      if(titulo&&titulo.textContent.indexOf('passadas')!==-1) s.style.display='none';
    });
  }
}

function renderPart(){

    info.appendChild(nm); info.appendChild(rl);

      var ed=document.createElement('button'); ed.className='btn-ico edit';

      chip.appendChild(ed);

      rm.onclick=(function(uid){return function(){removerPart(uid);};})(p.user_id);
      chip.appendChild(rm);

    btnCopy.innerHTML='&#128203; Link';

    btnCancel.className='btn-rm';
    btnCancel.innerHTML='&times;';
    btnCancel.onclick=(function(id){return function(){cancelarConvite(id);};})(cv.id);

    acoes.appendChild(btnCopy); acoes.appendChild(btnCancel);
    chip.appendChild(av); chip.appendChild(info); chip.appendChild(acoes);

  });

    var div=document.createElement('div'); div.className='vazio';

  if(!podeGerenciar()){toast('Sem permissao','err');return;}
  clr(['conv-email','conv-nome','sa-nome']);
  gi('conv-role').value='MEMBRO';
  abrirAbaConvite();
  abrirModal('m-part');
}

function gerarToken(){
  var arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}

function enviarConvite(){
  var email=gv('conv-email'), nome=gv('conv-nome'), role=gi('conv-role').value;
  if(!email){toast('E-mail e obrigatorio','err');return;}
  var btn=gi('btn-conv-ok');
  btn.disabled=true; btn.textContent='Processando...';

  // verifica se ja tem conta
  sb.from('profiles').select('id,nome').eq('email',email).single().then(function(res){
    if(res.data){
      // usuario ja existe - adiciona direto
      sb.from('viagem_participantes').upsert({viagem_id:VA.id,user_id:res.data.id,role:role}).then(function(){
        btn.disabled=false; btn.innerHTML='&#128231; Enviar convite';
        fecharModal('m-part'); clr(['conv-email','conv-nome']);
        recarregarParts();
        toast(res.data.nome+' ja tem conta e foi adicionado!','ok');
      });
      return;
    }

    // usuario nao existe - cria convite pendente com token
    var token = gerarToken();
    var link = window.location.origin + window.location.pathname + '?convite=' + token + '&email=' + encodeURIComponent(email);

    sb.from('convites_pendentes').upsert({
      email:email,
      viagem_id:VA.id,
      token:token,
      nome_convidado:nome||null,
      role:role,
      link:link,
      aceito:false
    }).then(function(err){
      btn.disabled=false; btn.innerHTML='&#128231; Enviar convite';
      fecharModal('m-part'); clr(['conv-email','conv-nome']);
      recarregarParts();
      toast('Convite gerado! Copie o link na lista de participantes.','ok');
    });
  });
}

function recarregarParts(){
  sb.from('viagem_participantes').select('id,user_id,role,sem_acesso,nome_externo,apelido,profiles(id,nome,email,papel)').eq('viagem_id',VA.id).then(function(r){
    PARTS=r.data||[];
    sb.from('convites_pendentes').select('*').eq('viagem_id',VA.id).eq('aceito',false).then(function(cv){
      CONVITES=cv.data||[];
      renderPart();
    });
  });
}

function copiarLink(link){
  navigator.clipboard.writeText(link).then(function(){
    toast('Link copiado! Cole no WhatsApp ou e-mail.','ok');
  }).catch(function(){
    // fallback
    var el=document.createElement('textarea');
    el.value=link; document.body.appendChild(el);
    el.select(); document.execCommand('copy');
    document.body.removeChild(el);
    toast('Link copiado!','ok');
  });
}

function cancelarConvite(id){
  if(!confirm('Cancelar este convite?')) return;
  sb.from('convites_pendentes').delete().eq('id',id).then(function(){
    recarregarParts(); toast('Convite cancelado','info');

function imprimir(secao){

  var mapa={voos:'tab-voos',hospedagem:'tab-hospedagem',passeios:'tab-parques',orcamento:'tab-orcamento',checklist:'tab-checklist'};
  var tabId=mapa[secao]; if(!tabId){window.print();return;}
  var conts=document.querySelectorAll('.tab-conteudo');
  var estados=[];
  for(var i=0;i<conts.length;i++){estados.push(conts[i].style.display);conts[i].style.display='none';}
  var alvo=gi(tabId); if(alvo) alvo.style.display='block';
  setTimeout(function(){
    window.print();
    for(var i=0;i<conts.length;i++) conts[i].style.display=estados[i];
    var ativas=document.querySelectorAll('.tab-conteudo.ativo');
    for(var i=0;i<ativas.length;i++) ativas[i].style.display='block';
  },150);
}

var _docFotoFile = null;

function previewDocFoto(inp){
  _docFotoFile = inp.files[0]; if(!_docFotoFile) return;
  var r=new FileReader();
  r.onload=function(e){
    var p=gi('prev-doc-foto'); p.src=e.target.result; p.style.display='block';
  };
  r.readAsDataURL(_docFotoFile);
}

function abrirModalDoc(){
  _docFotoFile=null;
  gi('prev-doc-foto').style.display='none';
  gi('doc-numero').value='';
  gi('doc-desc').value='';
  gi('inp-doc-foto').value='';
  // popular titular com participantes da viagem
  var sel=gi('doc-titular'); sel.innerHTML='';
  PARTS.forEach(function(p){
    var nome = p.apelido || (p.profiles?p.profiles.nome:p.nome_externo)||'?';
    var opt=document.createElement('option');
    opt.value=p.id; opt.textContent=nome;
    sel.appendChild(opt);
  });
  abrirModal('m-doc');
}

function salvarDoc(){
  var titularId=gi('doc-titular').value;
  var tipo=gi('doc-tipo').value;
  var desc=gi('doc-desc').value.trim();
  var numero=gi('doc-numero').value.trim();
  if(!tipo){toast('Tipo e obrigatorio','err');return;}
  var btn=gi('btn-salvar-doc'); btn.disabled=true; btn.textContent='Salvando...';

  function inserirDoc(fotoUrl){
    sb.from('documentos').insert({
      viagem_id:VA.id,
      titular_id:titularId||null,
      tipo:tipo, descricao:desc, numero:numero,
      foto_url:fotoUrl||null
    }).then(function(res){
      btn.disabled=false; btn.textContent='Salvar documento';
      if(res.error){toast('Erro: '+res.error.message,'err');return;}
      fecharModal('m-doc');
      renderDocs();
      toast('Documento salvo!','ok');
    });
  }

  if(_docFotoFile){
    var path=VA.id+'/docs/'+Date.now()+'-'+_docFotoFile.name;
    sb.storage.from('documentos').upload(path,_docFotoFile,{upsert:true}).then(function(res){
      if(res.error){inserirDoc(null);return;}
      var pub=sb.storage.from('documentos').getPublicUrl(path);
      inserirDoc(pub.data.publicUrl);
    });
  } else {
    inserirDoc(null);
  }
}

function renderDocs(){
  var lista=gi('lista-docs'); lista.innerHTML='';
  sb.from('documentos').select('*, viagem_participantes(id,apelido,nome_externo,profiles(nome))')
    .eq('viagem_id',VA.id).order('criado_em').then(function(res){
    var docs=res.data||[];
    if(!docs.length){
      var div=document.createElement('div'); div.className='vazio';
      div.innerHTML='<div class="vazio-icone">&#128196;</div>Nenhum documento cadastrado.';
      lista.appendChild(div); return;
    }
    // icones por tipo
    var icones={Passaporte:'&#127758;',RG:'&#127994;',CNH:'&#128663;',
      Visto:'&#128204;','Seguro viagem':'&#128274;',Reserva:'&#128203;',Outro:'&#128196;'};
    docs.forEach(function(d){
      var card=document.createElement('div'); card.className='doc-card';
      // foto ou icone
      var fotoDiv=document.createElement('div'); fotoDiv.className='doc-foto';
      if(d.foto_url){
        var img=document.createElement('img'); img.src=d.foto_url;
        img.onclick=(function(url){return function(){abrirLightbox(url);};})(d.foto_url);
        fotoDiv.appendChild(img);
      } else {
        fotoDiv.innerHTML=icones[d.tipo]||'&#128196;';
      }
      // info
      var info=document.createElement('div'); info.className='doc-info';
      var tipo=document.createElement('div'); tipo.className='doc-tipo'; tipo.textContent=d.tipo;
      var nome=document.createElement('div'); nome.className='doc-nome';
      nome.textContent=d.descricao||(d.tipo+(d.numero?' - '+d.numero:''));
      var detalhe=document.createElement('div'); detalhe.className='doc-detalhe';
      if(d.numero) detalhe.textContent='Num: '+d.numero;
      info.appendChild(tipo); info.appendChild(nome); info.appendChild(detalhe);
      // titular
      var acoes=document.createElement('div'); acoes.style.cssText='display:flex;flex-direction:column;align-items:flex-end;gap:6px';
      if(d.viagem_participantes){
        var vp=d.viagem_participantes;
        var nomeT=vp.apelido||(vp.profiles?vp.profiles.nome:vp.nome_externo)||'--';
        var tag=document.createElement('span'); tag.className='doc-titular'; tag.textContent=nomeT;
        acoes.appendChild(tag);
      }
      if(podeGerenciar()){
        var del=document.createElement('button'); del.className='btn-ico del';
        del.innerHTML='&#128465;';
        del.onclick=(function(id){return function(){delDoc(id);};})(d.id);
        acoes.appendChild(del);
      }
      card.appendChild(fotoDiv); card.appendChild(info); card.appendChild(acoes);
      lista.appendChild(card);
    });
  });
}

function delDoc(id){
  if(!confirm('Remover este documento?')) return;
  sb.from('documentos').delete().eq('id',id).then(function(){
    renderDocs(); toast('Documento removido','info');

}

// ── SELETOR DE PARTICIPANTES ──
function renderSeletorParticipantes(containerId, selecionados){
  var container = gi(containerId);
  if(!container) return;
  container.innerHTML='';

  // todos os participantes da viagem - qualquer papel, com ou sem acesso
  var todos = [];
  PARTS.forEach(function(p){
    // nome: apelido tem prioridade, depois nome do profile, depois nome externo
    var nome = p.apelido || (p.profiles ? p.profiles.nome : null) || p.nome_externo || '?';
    var cor  = p.profiles ? corAv(p.profiles.id) : '#94A3B8';
    var id   = p.user_id || ('ext_'+p.id);
    todos.push({id:id, nome:nome, cor:cor});
  });

  if(!todos.length){
    container.innerHTML='<span style="color:var(--muted);font-size:.85rem">Nenhum participante ainda</span>';
    return;
  }

  todos.forEach(function(u){
    var sel = selecionados && selecionados.indexOf(u.id) !== -1;
    var chip = document.createElement('div');
    chip.className = 'part-check' + (sel?' selecionado':'');
    chip.setAttribute('data-id', u.id);
    chip.setAttribute('data-nome', u.nome);
    var av = document.createElement('div'); av.className='pc-av';
    av.style.background = u.cor;
    av.textContent = u.nome.charAt(0).toUpperCase();
    var nm = document.createElement('span'); nm.textContent = u.nome;
    chip.appendChild(av); chip.appendChild(nm);
    chip.onclick = function(){
      chip.classList.toggle('selecionado');
    };
    container.appendChild(chip);
  });
}

function getSelecionados(containerId){
  var nomes = [];
  var chips = gi(containerId).querySelectorAll('.part-check.selecionado');
  chips.forEach(function(ch){ nomes.push(ch.getAttribute('data-nome')); });
  return nomes.join(', ');
}

function carregarTodasViagens(){
  var lista=gi('lista-todas-viagens');
  lista.innerHTML='<div class="vazio"><div class="vazio-icone">&#8987;</div>Carregando...</div>';
  sb.from('viagens').select('*, viagem_participantes(count), profiles!viagens_criado_por_fkey(nome)')
    .order('criado_em',{ascending:false}).then(function(res){
    var viagens=res.data||[];
    lista.innerHTML='';
    if(!viagens.length){
      lista.innerHTML='<div class="vazio">Nenhuma viagem no sistema.</div>';
      return;
    }
    viagens.forEach(function(v){
      var total=v.viagem_participantes&&v.viagem_participantes[0]?v.viagem_participantes[0].count:0;
      var criador=v.profiles?v.profiles.nome:'--';
      var status=_classificar(v);
      var statusLabel={'andamento':'Em andamento','proxima':'Proxima','passada':'Passada'}[status];
      var statusCor={'andamento':' style="color:var(--verde)"','proxima':' style="color:var(--azul2)"','passada':' style="color:var(--muted)"'}[status];
      var row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--borda);cursor:pointer';
      row.onclick=(function(vo){return function(){abrirViagem(vo);irPara('detalhe');};})(v);
      row.innerHTML=
        '<div style="flex:1">'+
          '<div style="font-weight:700;font-size:.95rem">'+v.nome+'</div>'+
          '<div style="font-size:.8rem;color:var(--muted)">&#128205; '+v.destino+' &bull; Criado por '+criador+'</div>'+
          '<div style="font-size:.78rem;color:var(--muted)">'+fmtD(v.ida)+' &#8594; '+fmtD(v.volta)+'</div>'+
        '</div>'+
        '<span style="font-size:.75rem;font-weight:700'+statusCor+'">'+statusLabel+'</span>'+
        '<span style="font-size:.8rem;color:var(--muted)">&#128101; '+total+'</span>';
      lista.appendChild(row);
    });
  });
}

function salvarEdicaoViagem(){
  var nome  = gi('ev-nome').value.trim();
  var dest  = gi('ev-dest').value.trim();
  var ida   = gi('ev-ida').value;
  var volta = gi('ev-volta').value;
  var obs   = gi('ev-obs').value;

  if(!nome||!dest){toast('Nome e destino sao obrigatorios','err');return;}

  var btn = document.querySelector('#m-editar-viagem .btn-ok');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}

  sb.from('viagens').update({
    nome:nome, destino:dest,
    ida:ida||null, volta:volta||null, obs:obs
  }).eq('id',VA.id).then(function(res){
    if(btn){btn.disabled=false;btn.textContent='Salvar alteracoes';}
    if(res.error){toast('Erro: '+res.error.message,'err');return;}
    // atualiza objeto local
    VA.nome    = nome;
    VA.destino = dest;
    VA.ida     = ida;
    VA.volta   = volta;
    VA.obs     = obs;
    // atualiza cabecalho
    gi('dh-nome').textContent  = nome;
    gi('dh-dest').innerHTML    = '&#128205; ' + dest;
    gi('dh-datas').textContent = fmtD(ida) + ' \u2192 ' + fmtD(volta);
    fecharModal('m-editar-viagem');
    toast('Viagem atualizada!','ok');
  });
}

// ── TOAST ──
var _tt;
function toast(msg,tipo){
  tipo=tipo||'ok';
  var t=gi('toast'); t.textContent=msg; t.className='show '+tipo;
  clearTimeout(_tt); _tt=setTimeout(function(){t.className='';},3500);
}
